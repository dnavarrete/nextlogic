<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" fill="none">
  <defs>
    <linearGradient id="growthGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B2FF59;stop-opacity:1" />
    </linearGradient>
    
    <symbol id="nex-logo" viewBox="0 0 120 80">
      <path d="M 20 70 L 50 30 L 80 50 L 110 10" stroke="url(#growthGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 110 10 L 95 10 M 110 10 L 110 25" stroke="#00C853" stroke-width="10" stroke-linecap="round" />
    </symbol>
  </defs>

  <g transform="translate(0, 0)">
    <use href="#nex-logo" x="0" y="0" width="100" height="80" />
    <text x="100" y="45" fill="#1A1A1A"  class="brand-text">Nex<tspan fill="#00C853">logic</tspan></text>
  </g>
</svg>
